version: '3.9'

# ── Shared environment ────────────────────────────────────────────
x-api-env: &api-env
  NODE_ENV:    ${NODE_ENV:-development}
  PORT:        ${PORT:-5001}
  MONGO_URI:   mongodb://mongo:27017/nxtstep
  REDIS_URL:   redis://redis:6379
  CLIENT_URL:  ${CLIENT_URL:-http://localhost:3000}
  JWT_SECRET:  ${JWT_SECRET:?JWT_SECRET is required}
  OPENROUTER_API_KEY:       ${OPENROUTER_API_KEY:-}
  OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-openai/gpt-4o-mini}
  DEEPGRAM_API_KEY:         ${DEEPGRAM_API_KEY:-}
  ELEVENLABS_API_KEY:       ${ELEVENLABS_API_KEY:-}
  GNEWS_API_KEY:            ${GNEWS_API_KEY:-}
  NEWSAPI_KEY:              ${NEWSAPI_KEY:-}
  SMTP_HOST:    ${SMTP_HOST:-mailhog}
  SMTP_PORT:    ${SMTP_PORT:-1025}
  SMTP_USER:    ${SMTP_USER:-}
  SMTP_PASS:    ${SMTP_PASS:-}
  SMTP_FROM:    ${SMTP_FROM:-noreply@nxtstep.local}

services:
  # ── MongoDB ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0-jammy
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test:     ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 15s
      timeout:  5s
      retries:  5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5

  # ── API Server ───────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     production
    restart: unless-stopped
    environment: *api-env
    ports:
      - "${PORT:-5001}:5001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval:     30s
      timeout:      10s
      start_period: 20s
      retries:      3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ── Worker Process ────────────────────────────────────────────────
  worker:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     production
    restart: unless-stopped
    command: ["node", "dist/workers/index.js"]
    environment: *api-env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '1.0'

  # ── MailHog (dev email) ───────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    profiles:
      - dev

volumes:
  mongo_data:  { driver: local }
  redis_data:  { driver: local }